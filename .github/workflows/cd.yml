name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GA_ID: ${{ secrets.GA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for university server
        run: pnpm build

      - name: Upload university build artifact
        uses: actions/upload-artifact@v4
        with:
          name: university-dist
          path: dist
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compute GitHub Pages base path
        id: pages
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"

          if [[ "$repo_name" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${repo_name}/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${repo_name}/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build for GitHub Pages
        env:
          VITEPRESS_BASE: ${{ steps.pages.outputs.base }}
          VITEPRESS_SITE_URL: ${{ steps.pages.outputs.site_url }}
        run: pnpm build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy_university:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download university build artifact
        uses: actions/download-artifact@v4
        with:
          name: university-dist
          path: dist

      - name: Deploy to university server
        uses: mai-space/action-sshpass-rsync@v2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          user: ${{ secrets.SSH_USERNAME }}
          pass: ${{ secrets.SSH_PASSWORD }}
          local: dist/
          remote: ../web

  deploy_github_pages:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
