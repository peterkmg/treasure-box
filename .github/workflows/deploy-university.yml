name: Deploy University Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-university
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and deploy to university
    runs-on: ubuntu-latest

    env:
      GA_ID: ${{ secrets.GA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends netcat-openbsd rsync sshpass

      - name: Check SSH reachability
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            echo "Checking SSH reachability, attempt ${attempt}/5..."
            if nc -z -w 20 "${SSH_HOST}" "${SSH_PORT}" >/dev/null 2>&1; then
              echo "SSH is reachable."
              exit 0
            fi

            if [ "${attempt}" -lt 5 ]; then
              echo "::warning::SSH reachability check failed. Retrying..."
              sleep $((attempt * 30))
            fi
          done

          echo "::error::Could not reach SSH after 5 attempts. The university server or network path may be temporarily unavailable."
          exit 1

      - name: Prepare SSH known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            echo "::warning::SSH_KNOWN_HOSTS is not set. Falling back to ssh-keyscan, which is less secure than pinning the host key in a secret."
            if ! ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "::error::Could not collect SSH host key."
              exit 1
            fi

            if [ ! -s ~/.ssh/known_hosts ]; then
              echo "::error::SSH host key scan returned no data."
              exit 1
            fi
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          rsync_ssh="ssh -p ${SSH_PORT} -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
          remote="${SSH_USERNAME}@${SSH_HOST}:../web"

          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}/3..."
            if sshpass -e rsync -az --delay-updates -e "${rsync_ssh}" dist/ "${remote}" >/tmp/rsync-deploy.log 2>&1; then
              exit 0
            fi

            if [ "${attempt}" -lt 3 ]; then
              echo "::warning::Deploy attempt failed. Retrying..."
              sleep $((attempt * 20))
            fi
          done

          echo "::error::Deployment failed after 3 attempts. Check SSH credentials, host reachability, and university server availability."
          exit 1
