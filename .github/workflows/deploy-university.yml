name: Deploy University Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-university
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and deploy to university
    runs-on: ubuntu-latest

    env:
      GA_ID: ${{ secrets.GA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends netcat-openbsd rsync sshpass

      - name: Check SSH reachability
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          nc -vz -w 15 "${SSH_HOST}" "${SSH_PORT}"

      - name: Prepare SSH known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            echo "::warning::SSH_KNOWN_HOSTS is not set. Falling back to ssh-keyscan, which is less secure than pinning the host key in a secret."
            ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail

          rsync_ssh="ssh -p ${SSH_PORT} -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o StrictHostKeyChecking=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3"
          remote="${SSH_USERNAME}@${SSH_HOST}:../web"

          for attempt in 1 2 3; do
            if sshpass -e rsync -az --delay-updates -e "${rsync_ssh}" dist/ "${remote}"; then
              exit 0
            fi

            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done

          exit 1
