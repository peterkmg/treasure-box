name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-github-pages
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      GA_ID: ${{ secrets.GA_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compute GitHub Pages base path
        id: pages
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"

          if [[ "${repo_name}" == *.github.io ]]; then
            echo "base=/" >> "${GITHUB_OUTPUT}"
            echo "site_url=https://${repo_name}/" >> "${GITHUB_OUTPUT}"
          else
            echo "base=/${repo_name}/" >> "${GITHUB_OUTPUT}"
            echo "site_url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build
        env:
          VITEPRESS_BASE: ${{ steps.pages.outputs.base }}
          VITEPRESS_SITE_URL: ${{ steps.pages.outputs.site_url }}
        run: pnpm build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
